<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanon | Productivity Redefined</title>
    <!-- Tailwind CSS JIT CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- Framer Motion via CDN (using a script-based approach for animations) -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: white;
            overflow-x: hidden;
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .kanon-hex-left {
            clip-path: polygon(100% 0, 100% 100%, 0 75%, 0 25%);
        }
        .kanon-hex-right {
            clip-path: polygon(0 0, 100% 25%, 100% 75%, 0 100%);
        }
        .shadow-glow {
            box-shadow: 0 0 50px rgba(79, 70, 229, 0.4);
        }
    </style>
</head>
<body class="bg-black">
    <!-- Navigation -->
    <nav class="fixed top-0 left-0 right-0 z-50 p-6 flex justify-center">
        <div class="max-w-6xl w-full glass rounded-2xl px-6 py-4 flex items-center justify-between border border-white/10 shadow-2xl">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-600 to-blue-700 flex items-center justify-center relative overflow-hidden shadow-lg">
                    <div class="relative w-6 h-6 flex items-center justify-center">
                        <div class="absolute left-0 w-3 h-5 bg-white/40 kanon-hex-left"></div>
                        <div class="absolute right-0 w-3 h-5 bg-white kanon-hex-right -translate-y-1"></div>
                    </div>
                </div>
                <span class="text-lg font-black uppercase tracking-widest italic">Kanon</span>
            </div>
            <div class="hidden md:flex items-center gap-8 text-xs font-bold uppercase tracking-widest text-gray-400">
                <a href="#" class="hover:text-white transition-colors">Features</a>
                <a href="#" class="hover:text-white transition-colors">Pricing</a>
                <a href="#" class="hover:text-white transition-colors">About</a>
                <button class="bg-white text-black px-5 py-2 rounded-lg hover:bg-gray-200 transition-all">Get Started</button>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <main class="min-h-screen pt-32 flex flex-col items-center justify-center px-6 relative">
        <!-- Background Accents -->
        <div class="absolute top-1/4 left-1/2 -translate-x-1/2 w-96 h-96 bg-indigo-600/20 blur-[120px] rounded-full pointer-events-none"></div>
        
        <div class="text-center z-10 max-w-4xl">
            <div class="inline-block px-4 py-1.5 rounded-full bg-white/5 border border-white/10 text-[10px] font-black uppercase tracking-[0.3em] text-indigo-400 mb-8">
                The Future of Focus
            </div>
            
            <h1 class="text-6xl md:text-8xl font-black italic tracking-tighter mb-8 leading-none">
                BUILD YOUR <br/>
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-blue-500">KANON</span><span class="text-indigo-500 text-7xl md:text-9xl ml-2">.</span>
            </h1>
            
            <p class="text-xl text-gray-400 mb-12 max-w-2xl mx-auto leading-relaxed">
                The ultra-minimalist focus engine designed for professional athletes, creators, and builders. No distractions. Just pure output.
            </p>

            <div class="flex flex-col md:flex-row items-center justify-center gap-6">
                <button class="w-full md:w-auto px-10 py-5 bg-white text-black font-black uppercase tracking-widest rounded-2xl hover:scale-105 transition-all shadow-glow">
                    Start Your Path
                </button>
                <button class="w-full md:w-auto px-10 py-5 glass border border-white/10 text-white font-black uppercase tracking-widest rounded-2xl hover:bg-white/5 transition-all">
                    View Demo
                </button>
            </div>
        </div>

        <!-- Visual Anchor -->
        <div class="mt-24 relative group">
            <div class="absolute inset-0 bg-indigo-600/20 blur-3xl opacity-0 group-hover:opacity-100 transition-opacity"></div>
            <div class="w-64 h-64 md:w-80 md:h-80 rounded-[3rem] bg-gradient-to-br from-indigo-600 to-blue-700 flex items-center justify-center relative overflow-hidden shadow-2xl border border-white/10">
                <div class="relative w-32 h-32 flex items-center justify-center">
                    <div class="absolute left-0 w-16 h-28 bg-white/30 kanon-hex-left"></div>
                    <div class="absolute right-0 w-16 h-28 bg-white kanon-hex-right -translate-y-4 shadow-2xl"></div>
                </div>
                <div class="absolute inset-0 bg-gradient-to-tr from-white/10 to-transparent"></div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="p-12 flex flex-col items-center gap-8 opacity-50">
        <div class="flex items-center gap-3">
             <div class="w-8 h-8 rounded-lg bg-white/10 flex items-center justify-center">
                <div class="relative w-4 h-4">
                    <div class="absolute left-0 w-2 h-3 bg-white/20 kanon-hex-left"></div>
                    <div class="absolute right-0 w-2 h-3 bg-white/60 kanon-hex-right -translate-y-0.5"></div>
                </div>
            </div>
            <span class="font-black uppercase tracking-[0.2em] text-sm italic flex items-baseline">
                Kanon
                <span class="text-indigo-500 text-2xl ml-1">.</span>
            </span>
        </div>
        <p class="text-[10px] uppercase tracking-widest font-bold">&copy; 2024 Kanon Dynamics. All rights reserved.</p>
    </footer>

    <!-- Simplified Animation Driver -->
    <script>
        // Simple entry animations using JS
        document.addEventListener('DOMContentLoaded', () => {
            const elements = document.querySelectorAll('h1, p, button, .glass, footer');
            elements.forEach((el, i) => {
                el.style.opacity = '0';
                el.style.transform = 'translateY(20px)';
                el.style.transition = 'all 0.8s cubic-bezier(0.16, 1, 0.3, 1)';
                setTimeout(() => {
                    el.style.opacity = '1';
                    el.style.transform = 'translateY(0)';
                }, 100 * i);
            });
        });
    </script>
</body>
</html>
